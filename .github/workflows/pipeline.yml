name: tourism-mlops-pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_DATASET_REPO: abhisekbasu/tourism-project-data
      HF_MODEL_REPO: abhisekbasu/tourism-project-model
      HF_SPACE_REPO: abhisekbasu/tourism-project-app

      TARGET_COL: ProdTaken
      TRAIN_PATH_IN_REPO: processed/train.csv
      TEST_PATH_IN_REPO: processed/test.csv

      LOCAL_CSV_PATH: tourism_project/data/tourism.csv
      OUTPUT_DIR: tourism_project/data/processed

      # Stable MLflow tracking (no server in CI)
      MLFLOW_TRACKING_URI: file:./mlruns
      MLFLOW_EXPERIMENT: MLOps_experiment
      CLASSIFICATION_THRESHOLD: "0.45"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas==2.2.2 numpy==1.26.4 scikit-learn==1.6.1 xgboost==3.2.0 joblib==1.5.3 huggingface_hub==0.24.6 mlflow==3.0.1

      - name: Run prep (register + split + upload)
        run: |
          python tourism_project/model_building/prep.py

      - name: Run train (tune + log + upload model)
        run: |
          python tourism_project/model_building/train.py

      - name: Push deployment to HF Space
        run: |
          python tourism_project/deployment/push_to_hf.py
