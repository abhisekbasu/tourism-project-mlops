# ============================================================
# Tourism Package Prediction — MLOps CI/CD Pipeline
# ============================================================
# Triggers: every push to main branch + manual workflow_dispatch.
# Steps: checkout → install → data prep → model train → deploy.
# Required secret: HF_TOKEN (Hugging Face write token).
# Raw CSV must be committed at: tourism_project/data/tourism.csv
# ============================================================
name: tourism-mlops-pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      # ── Hugging Face repos (no token in env — uses HF_TOKEN secret below) ──
      HF_TOKEN:         ${{ secrets.HF_TOKEN }}
      HF_DATASET_REPO:  abhisekbasu/tourism-project-data
      HF_MODEL_REPO:    abhisekbasu/tourism-project-model
      HF_SPACE_REPO:    abhisekbasu/tourism-project-app

      # ── Data / model config ───────────────────────────────────────────────
      TARGET_COL:                 ProdTaken
      TRAIN_PATH_IN_REPO:         processed/train.csv
      TEST_PATH_IN_REPO:          processed/test.csv
      LOCAL_CSV_PATH:             tourism_project/data/tourism.csv
      OUTPUT_DIR:                 tourism_project/data/processed
      MLFLOW_TRACKING_URI:        file:./mlruns
      MLFLOW_EXPERIMENT:          MLOps_experiment
      CLASSIFICATION_THRESHOLD:   "0.45"
      HF_MODEL_FILENAME:          best_tourism_model_v1.joblib

    steps:
      # 1. Check out repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python 3.12 (matches Dockerfile)
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Cache pip dependencies for faster reruns
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install pinned dependencies (identical to training environment)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pandas==2.2.2 \
            numpy==2.0.2 \
            scikit-learn==1.6.1 \
            xgboost==3.2.0 \
            joblib==1.5.3 \
            huggingface_hub==0.24.6 \
            mlflow==3.0.1

      # 5. Data preparation — upload raw CSV, clean, split, upload processed splits
      - name: Run data preparation (prep.py)
        run: |
          python tourism_project/model_building/prep.py

      # 6. Model training — GridSearchCV, MLflow logging, upload to HF Model Hub
      - name: Run model training (train.py)
        run: |
          python tourism_project/model_building/train.py

      # 7. Deployment — push Dockerfile + app.py + requirements.txt to HF Space
      - name: Deploy to Hugging Face Space (push_to_hf.py)
        run: |
          python tourism_project/deployment/push_to_hf.py
